<!DOCTYPE html>
<html lang="pt-BR">
	<head>
		<title>OpenCartaz - Gerar Cartaz</title>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<link rel="stylesheet" href="https://www.w3schools.com/w3css/5/w3.css">
		<link rel="stylesheet" href="/opencartaz/assets/css/cartaz.css">
		<link href="https://fonts.googleapis.com/css?family=Anton|Roboto:400,500,900" rel="stylesheet">
		<link rel="icon" href="/opencartaz/assets/icons/favicon.png" type="image/png">
		<script src="/opencartaz/assets/scripts/cartaz.js"></script>
	</head>
	  <body class="w3-container w3-dark-gray">
	    <div class="w3-right ui-elements">
			<button class="w3-button w3-yellow w3-round w3-section w3-large w3-card" onclick="window.print()" style="width: 128px;">Imprimir</button><br>
			<a href="/opencartaz/" class="w3-button w3-yellow w3-round w3-large w3-card" style="width: 128px;">Novo Cartaz</a>
		</div>
		<div class="cartaz-a4">
		  <div class="w3-display-container" style=" height:100%">
		  	<div id="mainTitle" class="w3-center" style="border-bottom: 1mm solid gray; margin: 0mm 10mm 0mm 10mm; height: 48mm;">
			  <div id="title" style="font-family: 'Roboto', sans-serif; font-weight:900; font-size:72pt; color:#d60000; line-height:48mm;"></div>
			</div>
			<div class="w3-center" style="padding: 5mm 10mm 10mm 10mm;">
			  <div id="product" style="font-family: 'Roboto', sans-serif; font-weight:900; font-size:72pt; color:black;"></div>
			  <div id= "description" style="font-family: 'Roboto', sans-serif; font-weight:900; font-size:36pt; color:black;"></div>
			</div>
			<div class="w3-display-bottommiddle" style="padding: 5mm 10mm 10mm 10mm; width:100%;">
			  <div style="font-family: 'Anton', sans-serif;font-size:84pt; color:#d60000;transform:scale(1,1.2); text-align:right; line-height: 1.2;"><span style="font-size:64pt;">R$</span><span id="price_int" style="font-size:260pt;"></span>,<span id="price_cents" style="font-size:84pt;"></span></div>
			  <div id="unit" style="font-family: 'Roboto', sans-serif; font-weight:900; font-size:36pt; color:black; text-align:right;"></div>
			</div>
		  </div>
		</div>
	</body>
</html>
